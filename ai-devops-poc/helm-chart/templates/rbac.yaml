apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-devops-assistant.fullname" . }}
  labels:
    {{- include "ai-devops-assistant.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ai-devops-assistant.fullname" . }}-reader
  labels:
    {{- include "ai-devops-assistant.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ai-devops-assistant.fullname" . }}-reader
  labels:
    {{- include "ai-devops-assistant.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ai-devops-assistant.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "ai-devops-assistant.fullname" . }}
    namespace: {{ .Release.Namespace }}
