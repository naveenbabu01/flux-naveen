apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-troubleshooter.fullname" . }}
  labels:
    {{- include "k8s-troubleshooter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-troubleshooter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-troubleshooter.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s-troubleshooter.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: api-key
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.env.AZURE_OPENAI_ENDPOINT | quote }}
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              value: {{ .Values.env.AZURE_OPENAI_DEPLOYMENT_NAME | quote }}
            - name: AZURE_OPENAI_API_VERSION
              value: {{ .Values.env.AZURE_OPENAI_API_VERSION | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
