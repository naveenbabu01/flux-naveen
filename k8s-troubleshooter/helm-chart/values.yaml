replicaCount: 2

image:
  repository: pythonacrtest.azurecr.io/k8s-troubleshooter
  tag: v1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  AZURE_OPENAI_ENDPOINT: "https://test-ai-poc-nav.openai.azure.com/"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4.1"
  AZURE_OPENAI_API_VERSION: "2024-02-01"

secretName: azure-openai-secret
