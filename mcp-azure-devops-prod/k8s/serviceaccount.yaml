apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-sa
  namespace: mcp-server
  annotations:
    # Workload Identity — links this K8s SA to an Azure Managed Identity
    azure.workload.identity/client-id: "<YOUR-MANAGED-IDENTITY-CLIENT-ID>"
  labels:
    azure.workload.identity/use: "true"
