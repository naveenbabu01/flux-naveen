name: MCP Server CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-azure-devops

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint with ruff
        run: ruff check src/

      - name: Run unit tests (mocked)
        env:
          AZURE_SUBSCRIPTION_ID: "00000000-test-test-test-000000000000"
          AZURE_TENANT_ID:       "00000000-test-test-test-000000000000"
          AZURE_CLIENT_ID:       "00000000-test-test-test-000000000000"
          AZURE_CLIENT_SECRET:   "mock-secret"
          GITHUB_TOKEN:          "ghp_mock_token_for_tests"
          JIRA_URL:              "https://mock.atlassian.net"
          JIRA_EMAIL:            "test@test.com"
          JIRA_API_TOKEN:        "mock-token"
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: mcp-azure-devops

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mcp-azure-devops:test .

      - name: Verify image starts
        run: |
          docker run --rm \
            -e AZURE_SUBSCRIPTION_ID=mock \
            -e AZURE_TENANT_ID=mock \
            -e AZURE_CLIENT_ID=mock \
            -e AZURE_CLIENT_SECRET=mock \
            -e GITHUB_TOKEN=mock \
            mcp-azure-devops:test python -c "from src.server import server; print('MCP server imports OK')"